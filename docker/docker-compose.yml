services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-coach}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-coachpass}
      POSTGRES_DB: ${POSTGRES_DB:-interviewcoach}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-coach} -d ${POSTGRES_DB:-interviewcoach}"]
      interval: 5s
      timeout: 5s
      retries: 20
    ports:
      - "${POSTGRES_PORT:-5432}:5432"

  api:
    build:
      context: ../src/backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      ASPNETCORE_URLS: http://+:8080
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__Default: Host=postgres;Port=5432;Database=${POSTGRES_DB:-interviewcoach};Username=${POSTGRES_USER:-coach};Password=${POSTGRES_PASSWORD:-coachpass}
      Cors__AllowedOrigin: ${FRONTEND_ORIGIN:-http://localhost:5173}
      Telemetry__Enabled: "false"
      Llm__BaseUrl: http://ollama:11434
      Llm__ApiKey: ${LLM_API_KEY:-ollama}
      Llm__Model: ${LLM_MODEL:-qwen2.5:7b-instruct}
      Llm__TimeoutSeconds: ${LLM_TIMEOUT_SECONDS:-60}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/health/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 20s
    ports:
      - "${API_PORT:-8080}:8080"

  frontend:
    build:
      context: ../src/frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8080/api}
        VITE_SPEECH_URL: ${VITE_SPEECH_URL:-http://localhost:8000}
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/ >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
    ports:
      - "${FRONTEND_PORT:-5173}:80"

  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD-SHELL", "ollama list >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 20
    ports:
      - "${OLLAMA_PORT:-11434}:11434"

  speech-service:
    build:
      context: ../services/speech-service
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      MODEL: ${SPEECH_MODEL:-small}
      SPEECH_PROFILE: ${SPEECH_PROFILE:-auto}
      SPEECH_LATENCY_PROFILE: ${SPEECH_LATENCY_PROFILE:-ultra}
      SPEECH_BEAM_SIZE: ${SPEECH_BEAM_SIZE:-1}
      SPEECH_BEST_OF: ${SPEECH_BEST_OF:-1}
      SPEECH_NO_SPEECH_THRESHOLD: ${SPEECH_NO_SPEECH_THRESHOLD:-0.6}
      SPEECH_COMPUTE_TYPE: ${SPEECH_COMPUTE_TYPE:-int8}
      SPEECH_DEVICE: ${SPEECH_DEVICE:-cpu}
      SPEECH_CPU_THREADS: ${SPEECH_CPU_THREADS:-8}
      SPEECH_NUM_WORKERS: ${SPEECH_NUM_WORKERS:-1}
      STREAM_DECODE_INTERVAL_MS: ${STREAM_DECODE_INTERVAL_MS:-200}
      STREAM_COMMIT_AGREEMENT_PASSES: ${STREAM_COMMIT_AGREEMENT_PASSES:-1}
      VAD_MIN_SPEECH_MS: ${VAD_MIN_SPEECH_MS:-300}
      VAD_SILENCE_MS: ${VAD_SILENCE_MS:-900}
      STRICT_QUALITY_MODE: ${STRICT_QUALITY_MODE:-true}
    volumes:
      - speech_model_cache:/root/.cache/huggingface
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/health || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 20
      start_period: 90s
    ports:
      - "${SPEECH_PORT:-8000}:8000"

volumes:
  pgdata:
  ollama_data:
  speech_model_cache:
