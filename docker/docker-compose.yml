services:
  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - appnet

  postgres:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_USER: coach
      POSTGRES_PASSWORD: coachpass
      POSTGRES_DB: interviewcoach
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U coach -d interviewcoach"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - appnet

  backend:
    build:
      context: ../src/backend
      dockerfile: Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__Default=Host=postgres;Port=5432;Database=interviewcoach;Username=coach;Password=coachpass
      - Llm__BaseUrl=http://ollama:11434
      - Llm__Model=qwen2.5:7b-instruct
      - Llm__Temperature=0.2
    depends_on:
      postgres:
        condition: service_healthy
      ollama:
        condition: service_started
    ports:
      - "5000:8080"
    networks:
      - appnet

  frontend:
    build:
      context: ../src/frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    networks:
      - appnet

  speech-service:
    build:
      context: ../services/speech-service
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    networks:
      - appnet

volumes:
  pgdata:
  ollama_data:

networks:
  appnet:
    driver: bridge

