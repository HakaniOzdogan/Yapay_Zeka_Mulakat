worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 4096;
    server_tokens off;

    # Ingestion endpoints allow up to 5MB; keep slightly above for headroom.
    client_max_body_size 8m;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    upstream frontend_upstream {
        server frontend:80;
    }

    upstream api_upstream {
        server api:8080;
    }

    upstream speech_upstream {
        server speech-service:8000;
    }

    # HTTP -> HTTPS redirect (leave ACME challenge on HTTP).
    server {
        listen 80;
        listen [::]:80;
        server_name _;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # TLS-ready server.
    server {
        listen 443 ssl http2;
        listen [::]:443 ssl http2;
        server_name _;

        # Replace with your certificate files (Let's Encrypt or managed certs).
        ssl_certificate /etc/nginx/certs/fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers off;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;

        # Security headers.
        add_header X-Content-Type-Options nosniff always;
        add_header X-Frame-Options DENY always;
        add_header Referrer-Policy no-referrer always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        add_header Content-Security-Policy "default-src 'self'; connect-src 'self' https: wss:; img-src 'self' data: blob:; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline';" always;

        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Frontend app.
        location / {
            proxy_pass http://frontend_upstream;
            proxy_read_timeout 60s;
            proxy_send_timeout 60s;
        }

        # Backend API.
        location /api/ {
            proxy_pass http://api_upstream/api/;
            proxy_read_timeout 600s;  # finalize/llm can take longer
            proxy_send_timeout 600s;
        }

        # Backend-served question audio recordings.
        location /audio/ {
            proxy_pass http://api_upstream/audio/;
            proxy_read_timeout 60s;
            proxy_send_timeout 60s;
        }

        # Backend health passthrough.
        location /health {
            proxy_pass http://api_upstream/health;
            proxy_read_timeout 30s;
            proxy_send_timeout 30s;
        }

        # Speech-service proxy with websocket upgrade.
        # /speech/ws/transcribe -> speech-service /ws/transcribe
        location /speech/ {
            rewrite ^/speech/?(.*)$ /$1 break;
            proxy_pass http://speech_upstream;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }
    }
}
