name: CI

on:
  push:
  pull_request:

jobs:
  backend:
    name: Backend Build and Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
          cache: true
          cache-dependency-path: src/backend/**/*.csproj

      - name: Restore
        working-directory: src/backend
        run: dotnet restore InterviewCoach.sln

      - name: Build
        working-directory: src/backend
        run: dotnet build InterviewCoach.sln --configuration Release --no-restore

      - name: Test (TRX)
        working-directory: src/backend
        run: dotnet test InterviewCoach.sln --configuration Release --no-build --logger "trx;LogFileName=test_results.trx" --results-directory TestResults

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-results
          path: |
            src/backend/TestResults/**/*.trx
            src/backend/**/TestResults/**/*.trx
          if-no-files-found: warn

  frontend:
    name: Frontend Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: npm
          cache-dependency-path: src/frontend/package-lock.json

      - name: Install dependencies
        working-directory: src/frontend
        run: npm ci

      - name: Build
        working-directory: src/frontend
        run: npm run build

  speech_service:
    name: Speech Service Check
    runs-on: ubuntu-latest
    if: ${{ hashFiles('services/speech-service/requirements.txt') != '' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        working-directory: services/speech-service
        run: pip install -r requirements.txt

      - name: Validate service imports
        working-directory: services/speech-service
        run: |
          python -m py_compile app/main.py
          python -c "import fastapi, uvicorn"